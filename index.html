<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PartyRadar</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b0f;
      color: white;
    }

    header {
      text-align: center;
      padding: 40px 20px 30px;
      background: #0b0b0f;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 48px;
    }

    .subtitle {
      color: #cfcfcf;
      margin: 0;
      font-size: 18px;
    }

    .container {
      display: grid;
      grid-template-columns: 420px 1fr;
      min-height: calc(100vh - 126px);
    }

    .sidebar {
      background: #1b1f2d;
      padding: 20px;
      border-right: 1px solid #2f3550;
      overflow-y: auto;
    }

    .sidebar h2 {
      margin-top: 0;
      font-size: 28px;
      margin-bottom: 16px;
    }

    .status {
      background: #202638;
      border: 1px solid #38415d;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 16px;
      color: #c8cada;
      font-size: 14px;
      line-height: 1.5;
    }

    .event {
      background: #202638;
      border: 1px solid #2f3550;
      padding: 14px;
      margin-bottom: 12px;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .event:hover {
      border-color: #ff0055;
      transform: translateY(-2px);
    }

    .event.active {
      border-color: #ff0055;
      box-shadow: 0 0 0 1px #ff0055 inset;
    }

    .event h3 {
      margin: 0 0 8px;
      font-size: 18px;
      line-height: 1.3;
    }

    .event p {
      margin: 4px 0;
      color: #c8cada;
      font-size: 14px;
      line-height: 1.5;
    }

    #map {
      height: calc(100vh - 126px);
      width: 100%;
      background: #111723;
    }

    @media (max-width: 900px) {
      .container {
        grid-template-columns: 1fr;
      }

      #map {
        height: 420px;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>PartyRadar</h1>
    <p class="subtitle">Live Events & Bands auf echter Karte</p>
  </header>

  <div class="container">
    <div class="sidebar">
      <h2>Events</h2>
      <div id="status" class="status">Seite startet...</div>
      <div id="events"></div>
    </div>

    <div id="map"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const SUPABASE_URL = "https://dwyhpirtbjfmohcnhdak.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR3eWhwaXJ0YmpmbW9oY25oZGFrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1OTM2MzEsImV4cCI6MjA5MTE2OTYzMX0.FAUJSiEMVa7P5y7hLcaBMFDuHmiFceqIy8z9mTJeUOQ";

    const demoEvents = [
      {
        id: 1,
        name: "Latin Night Marbella",
        location_name: "Max Beach",
        city: "Mijas Costa",
        event_date: "2026-07-12",
        event_time: "20:30",
        genre: "Latin",
        price_text: "25€",
        lat: 36.4959,
        lng: -4.7345
      },
      {
        id: 2,
        name: "Salsa Party",
        location_name: "Ocean Club",
        city: "Marbella",
        event_date: "2026-07-13",
        event_time: "19:00",
        genre: "Salsa",
        price_text: "30€",
        lat: 36.4879,
        lng: -4.9530
      },
      {
        id: 3,
        name: "Rock Night",
        location_name: "Fuengirola Port",
        city: "Fuengirola",
        event_date: "2026-07-14",
        event_time: "21:30",
        genre: "Rock",
        price_text: "18€",
        lat: 36.5336,
        lng: -4.6207
      }
    ];

    const statusBox = document.getElementById("status");
    const eventsBox = document.getElementById("events");

    function showStatus(message) {
      statusBox.innerHTML = message;
    }

    function formatDate(dateText) {
      if (!dateText) return "";
      return dateText;
    }

    function formatPrice(priceText) {
      if (!priceText) return "Eintritt frei";
      if (String(priceText).toLowerCase() === "free") return "Eintritt frei";
      return priceText;
    }

    let map;
    let markers = [];
    let currentEvents = [];

    function initMap() {
      map = L.map("map").setView([36.55, -4.75], 10);

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: "&copy; OpenStreetMap contributors"
      }).addTo(map);

      setTimeout(() => {
        map.invalidateSize();
      }, 300);
    }

    function clearMarkers() {
      markers.forEach(marker => map.removeLayer(marker));
      markers = [];
    }

    function renderEvents(data, sourceName) {
      currentEvents = data || [];
      eventsBox.innerHTML = "";
      clearMarkers();

      if (!currentEvents.length) {
        showStatus("Keine Events gefunden.");
        return;
      }

      showStatus(currentEvents.length + " Event(s) geladen" + (sourceName ? " – " + sourceName : "") + ".");

      const bounds = [];

      currentEvents.forEach(event => {
        const card = document.createElement("div");
        card.className = "event";

        card.innerHTML = `
          <h3>${event.name || "Ohne Titel"}</h3>
          <p>📍 ${event.location_name || ""}${event.city ? ", " + event.city : ""}</p>
          <p>📅 ${formatDate(event.event_date)}${event.event_time ? " | ⏰ " + event.event_time : ""}</p>
          <p>🎵 ${event.genre || ""}</p>
          <p>💶 ${formatPrice(event.price_text)}</p>
        `;

        let marker = null;

        if (event.lat && event.lng) {
          marker = L.marker([event.lat, event.lng]).addTo(map);

          marker.bindPopup(`
            <strong>${event.name || "Ohne Titel"}</strong><br>
            ${event.location_name || ""}${event.city ? ", " + event.city : ""}<br>
            ${formatDate(event.event_date)} ${event.event_time || ""}<br>
            ${event.genre || ""}
          `);

          markers.push(marker);
          bounds.push([event.lat, event.lng]);
        }

        card.onclick = () => {
          document.querySelectorAll(".event").forEach(el => el.classList.remove("active"));
          card.classList.add("active");

          if (event.lat && event.lng) {
            map.setView([event.lat, event.lng], 13);
            if (marker) marker.openPopup();
          }
        };

        eventsBox.appendChild(card);
      });

      if (bounds.length > 0) {
        map.fitBounds(bounds, { padding: [30, 30] });
      }

      setTimeout(() => {
        map.invalidateSize();
      }, 200);
    }

    async function loadFromSupabase() {
      if (!SUPABASE_URL || !SUPABASE_URL.includes("supabase.co")) {
        throw new Error("Supabase URL fehlt oder ist falsch.");
      }

      if (!SUPABASE_KEY || SUPABASE_KEY.length < 20) {
        throw new Error("Supabase Key fehlt oder ist falsch.");
      }

      const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      const { data, error } = await client
        .from("events")
        .select("*")
        .order("event_date", { ascending: true });

      if (error) {
        throw new Error(error.message);
      }

      return data || [];
    }

    async function startApp() {
      initMap();
      showStatus("Lade Events aus Supabase...");

      try {
        const data = await loadFromSupabase();

        if (!data.length) {
          showStatus("Supabase verbunden, aber keine Events gefunden. Zeige Demo-Events.");
          renderEvents(demoEvents, "Demo");
          return;
        }

        renderEvents(data, "Supabase");
      } catch (err) {
        console.error(err);
        showStatus("Supabase-Fehler: " + err.message + "<br>Demo-Events werden angezeigt.");
        renderEvents(demoEvents, "Demo");
      }
    }

    startApp();
  </script>
</body>
</html>
