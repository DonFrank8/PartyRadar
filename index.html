<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PartyRadar</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #0b0b0f, #161622);
      color: white;
    }

    .lang-switcher {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 10px;
    }

    .lang-switcher button {
      padding: 8px 14px;
      border: 1px solid #3a3f57;
      background: #222637;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    header {
      padding: 80px 20px 50px;
      text-align: center;
    }

    h1 {
      font-size: 56px;
    }

    p {
      color: #cfcfd6;
    }

    .buttons {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 14px 28px;
      border-radius: 10px;
      font-weight: bold;
      border: none;
      cursor: pointer;
    }

    .btn-primary { background: #ff0055; color: white; }
    .btn-secondary { background: #222637; color: white; }

    section {
      padding: 40px 20px;
      max-width: 1100px;
      margin: auto;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1b1f2d;
      padding: 20px;
      border-radius: 12px;
    }

    footer {
      text-align: center;
      padding: 30px;
      color: #999;
    }
  </style>
</head>

<body>

<header>
  <div class="lang-switcher">
    <button onclick="setLang('de')">DE</button>
    <button onclick="setLang('es')">ES</button>
    <button onclick="setLang('en')">EN</button>
  </div>

  <h1 id="title">PartyRadar</h1>
  <p id="subtitle">Finde lokale Bands, Live-Events & DJs</p>

  <div class="buttons">
    <button class="btn btn-primary" id="btnEvents">Events entdecken</button>
    <button class="btn btn-secondary" id="btnBands">Bands suchen</button>
  </div>
</header>

<section>
  <h2 id="sectionTitle">Was du findest</h2>

  <div class="grid">
    <div class="card">
      <h3 id="card1Title">Live-Events</h3>
      <p id="card1Text">Konzerte & Events</p>
    </div>

    <div class="card">
      <h3 id="card2Title">Bands</h3>
      <p id="card2Text">Alle Musikrichtungen</p>
    </div>

    <div class="card">
      <h3 id="card3Title">Locations</h3>
      <p id="card3Text">Clubs & Bars</p>
    </div>
  </div>
</section>

<section>
  <h2 id="eventsTitle">Events</h2>

  <div class="buttons">
    <button onclick="filterEvents('All')" id="filterAll">Alle</button>
    <button onclick="filterEvents('Latin')" id="filterLatin">Latin</button>
    <button onclick="filterEvents('Flamenco')" id="filterFlamenco">Flamenco</button>
    <button onclick="filterEvents('DJ')" id="filterDJ">DJ</button>
  </div>

  <div class="grid" id="eventsContainer"></div>
</section>

<footer id="footerText">
  © 2026 PartyRadar
</footer>

<script>
const translations = {
  de: {
    title: "PartyRadar",
    subtitle: "Finde lokale Bands, Live-Events & DJs",
    btnEvents: "Events entdecken",
    btnBands: "Bands suchen",
    sectionTitle: "Was du findest",
    card1Title: "Live-Events",
    card1Text: "Konzerte & Events",
    card2Title: "Bands",
    card2Text: "Alle Musikrichtungen",
    card3Title: "Locations",
    card3Text: "Clubs & Bars",
    footerText: "© 2026 PartyRadar",
    eventsTitle: "Aktuelle Events",
    filterAll: "Alle",
    filterLatin: "Latin",
    filterFlamenco: "Flamenco",
    filterDJ: "DJ"
  },
  es: {
    title: "PartyRadar",
    subtitle: "Encuentra eventos y DJs",
    btnEvents: "Eventos",
    btnBands: "Bandas",
    sectionTitle: "Qué encontrarás",
    card1Title: "Eventos",
    card1Text: "Conciertos",
    card2Title: "Bandas",
    card2Text: "Música",
    card3Title: "Lugares",
    card3Text: "Clubs",
    footerText: "© 2026 PartyRadar",
    eventsTitle: "Eventos actuales",
    filterAll: "Todos",
    filterLatin: "Latino",
    filterFlamenco: "Flamenco",
    filterDJ: "DJ"
  },
  en: {
    title: "PartyRadar",
    subtitle: "Find local events",
    btnEvents: "Events",
    btnBands: "Bands",
    sectionTitle: "What you find",
    card1Title: "Events",
    card1Text: "Concerts",
    card2Title: "Bands",
    card2Text: "Music",
    card3Title: "Locations",
    card3Text: "Clubs",
    footerText: "© 2026 PartyRadar",
    eventsTitle: "Current events",
    filterAll: "All",
    filterLatin: "Latin",
    filterFlamenco: "Flamenco",
    filterDJ: "DJ"
  }
};

const events = [
  { name: "Latin Night Marbella", location: "Max Beach", date: "12.07.2026", type: "Latin" },
  { name: "Flamenco Show", location: "Estepona", date: "15.07.2026", type: "Flamenco" },
  { name: "House Sunset", location: "Nikki Beach", date: "18.07.2026", type: "DJ" }
];

function setLang(lang) {
  document.getElementById("title").innerText = translations[lang].title;
  document.getElementById("subtitle").innerText = translations[lang].subtitle;
  document.getElementById("btnEvents").innerText = translations[lang].btnEvents;
  document.getElementById("btnBands").innerText = translations[lang].btnBands;
  document.getElementById("sectionTitle").innerText = translations[lang].sectionTitle;
  document.getElementById("card1Title").innerText = translations[lang].card1Title;
  document.getElementById("card1Text").innerText = translations[lang].card1Text;
  document.getElementById("card2Title").innerText = translations[lang].card2Title;
  document.getElementById("card2Text").innerText = translations[lang].card2Text;
  document.getElementById("card3Title").innerText = translations[lang].card3Title;
  document.getElementById("card3Text").innerText = translations[lang].card3Text;
  document.getElementById("footerText").innerText = translations[lang].footerText;
  document.getElementById("eventsTitle").innerText = translations[lang].eventsTitle;
  document.getElementById("filterAll").innerText = translations[lang].filterAll;
  document.getElementById("filterLatin").innerText = translations[lang].filterLatin;
  document.getElementById("filterFlamenco").innerText = translations[lang].filterFlamenco;
  document.getElementById("filterDJ").innerText = translations[lang].filterDJ;
}

function loadEvents(list) {
  const container = document.getElementById("eventsContainer");
  container.innerHTML = "";

  list.forEach(e => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `<h3>${e.name}</h3><p>${e.location}</p><p>${e.date}</p><p>${e.type}</p>`;
    container.appendChild(div);
  });
}

function filterEvents(type) {
  if (type === "All") return loadEvents(events);
  loadEvents(events.filter(e => e.type === type));
}

loadEvents(events);
</script>

</body>
</html>
