<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>PartyRadar Admin | Event Moderation</title>
  <meta
    name="description"
    content="PartyRadar Admin Dashboard zur Prüfung, Freigabe und Ablehnung von Event-Einreichungen."
  >
  <script>
    (function () {
      var cacheBuster = String(Date.now());
      window.PARTYRADAR_ADMIN_BUILD = cacheBuster;
      var stylesheet = document.createElement("link");
      stylesheet.rel = "stylesheet";
      stylesheet.href = "./admin.css?v=" + encodeURIComponent(cacheBuster);
      document.head.appendChild(stylesheet);
    })();
  </script>
</head>
<body>
  <header class="admin-header">
    <div class="admin-header__inner">
      <div>
        <p class="admin-header__eyebrow">PartyRadar</p>
        <h1>Admin Dashboard</h1>
        <p class="admin-header__subtitle">Moderation, Qualitätssicherung und Featured-Vorbereitung.</p>
      </div>
      <div class="admin-header__actions">
        <a class="button button--ghost" href="./index.html">Zur öffentlichen Seite</a>
      </div>
    </div>
  </header>

  <main class="admin-shell">
    <section id="adminAuthCard" class="card card--auth">
      <h2>Admin Login</h2>
      <p class="card__intro">Nur freigegebene Admin-E-Mails können Moderation und Statusänderungen durchführen.</p>
      <form id="adminLoginForm" class="auth-form" novalidate>
        <label class="field">
          <span>E-Mail</span>
          <input id="adminEmail" type="email" placeholder="admin@deinedomain.com" required>
        </label>
        <label class="field">
          <span>Passwort</span>
          <input id="adminPassword" type="password" placeholder="Passwort" required>
        </label>
        <button id="adminLoginButton" type="submit" class="button button--primary">Einloggen</button>
      </form>
      <p id="adminAuthFeedback" class="message" hidden></p>
    </section>

    <section id="adminWorkspace" class="workspace" hidden>
      <section class="card card--toolbar">
        <div class="toolbar-top">
          <div>
            <h2>Event Moderation</h2>
            <p id="adminSessionInfo" class="card__intro">-</p>
          </div>
          <button id="adminSignOutButton" type="button" class="button button--ghost">Abmelden</button>
        </div>

        <div class="status-tabs" role="tablist" aria-label="Status Filter">
          <button type="button" class="status-tab is-active" data-status-filter="all">
            Alle <span id="countAll" class="count-badge">0</span>
          </button>
          <button type="button" class="status-tab status-tab--pending" data-status-filter="pending">
            Pending <span id="countPending" class="count-badge">0</span>
          </button>
          <button type="button" class="status-tab status-tab--approved" data-status-filter="approved">
            Approved <span id="countApproved" class="count-badge">0</span>
          </button>
          <button type="button" class="status-tab status-tab--rejected" data-status-filter="rejected">
            Rejected <span id="countRejected" class="count-badge">0</span>
          </button>
        </div>

        <form id="adminFiltersForm" class="filter-grid" autocomplete="off">
          <label class="field">
            <span>Suche</span>
            <input id="filterSearch" type="search" placeholder="Name, Location, Adresse, Beschreibung...">
          </label>
          <label class="field">
            <span>Stadt</span>
            <select id="filterCity">
              <option value="">Alle Städte</option>
            </select>
          </label>
          <label class="field">
            <span>Genre</span>
            <select id="filterGenre">
              <option value="">Alle Genres</option>
            </select>
          </label>
          <label class="field">
            <span>Status</span>
            <select id="filterStatus">
              <option value="">Alle</option>
              <option value="pending">pending</option>
              <option value="approved">approved</option>
              <option value="rejected">rejected</option>
            </select>
          </label>
          <button id="resetFiltersButton" type="button" class="button button--ghost">Filter zurücksetzen</button>
        </form>
      </section>

      <p id="adminGlobalFeedback" class="message" hidden></p>
      <section id="adminEventGrid" class="event-grid"></section>
      <p id="adminEmptyState" class="empty-state" hidden>Keine Events für die aktuelle Auswahl.</p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    (function () {
      var script = document.createElement("script");
      script.src = "./admin.js?v=" + encodeURIComponent(window.PARTYRADAR_ADMIN_BUILD || Date.now());
      document.body.appendChild(script);
    })();
  </script>
</body>
</html>
